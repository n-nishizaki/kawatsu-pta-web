---
layout: default
---
<div id="main">

  <div class="post-header">
    <h1>{{ page.title }}</h1>
    <div class="post-meta">
      <span class="post-meta-label">公開日</span>
      <span class="post-meta-value">{{ page.date | date: "%Y年%-m月%-d日" }}</span>
      {% if page.updated %}
      <span class="post-meta-sep">｜</span>
      <span class="post-meta-label">更新日</span>
      <span class="post-meta-value">{{ page.updated }}</span>
      {% endif %}
    </div>
  </div>

  <div class="post-body">
{{ content }}
  </div>

  <div class="back-link">
    <a href="{{ '/event/' | relative_url }}">&laquo; お知らせ一覧に戻る</a>
  </div>

</div>
